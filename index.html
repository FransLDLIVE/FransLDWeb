<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - FransLDLIVE</title>
  <link rel="icon" type="image/png" href="images/icon.png">
  <style>
    html, body {
      margin: 0;
      background: #050507;
      color: #fff;
    }
  </style>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <img src="images/logo.png" alt="FransLDLIVE Logo" class="logo-img">
    </div>
    <div class="nav-right">
      <div class="dropdown">
        <button class="hamburger" id="dropdownBtn" type="button" aria-label="Open navigation menu" aria-expanded="false" aria-controls="dropdownMenu">
          <span class="line line1"></span>
          <span class="line line2"></span>
          <span class="line line3"></span>
        </button>
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="index.html" class="dropdown-link" aria-current="page">Home</a>
          <a href="socials.html" class="dropdown-link">Socials</a>
          <a href="texturepacks.html" class="dropdown-link">Texture Packs</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="page-shell">
    <div class="content-card">
      <header>
        <h1>Home</h1>
        <p>Home page is still a work in progress</p>
      </header>

      <main>
        <p style="font-size: 1.05rem; color: #ddd; line-height: 1.8; margin: 0;">
          The home page is still being worked on.
        </p>
        <p style="font-size: 1rem; color: #bbb; line-height: 1.7; margin: 20px 0 0;">
          You can explore the <strong>Socials</strong> and <strong>Texture Packs</strong> tabs while this page is being built.
        </p>
      </main>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 LD Studios</p>
    <p class="footer-credit">Website created and coded by FransLDLIVE</p>
  </footer>

  <script>
    const dropdownBtn = document.getElementById('dropdownBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');

    function setMenuState(isOpen) {
      dropdownBtn.classList.toggle('active', isOpen);
      dropdownMenu.classList.toggle('active', isOpen);
      dropdownBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    }

    dropdownBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      const isOpen = !dropdownBtn.classList.contains('active');
      setMenuState(isOpen);
    });

    document.addEventListener('click', function() {
      setMenuState(false);
    });

    dropdownMenu.addEventListener('click', function(e) {
      e.stopPropagation();
    });

    const dropdownLinks = document.querySelectorAll('.dropdown-link');
    dropdownLinks.forEach(link => {
      link.addEventListener('click', function(e) {
        const nextUrl = link.getAttribute('href');
        if (!nextUrl) return;

        e.preventDefault();
        setMenuState(false);
        document.body.classList.add('page-leaving');
        setTimeout(() => {
          window.location.href = nextUrl;
        }, 220);
      });
    });
  </script>
</body>
</html>
