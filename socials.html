<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Socials - FransLDLIVE</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <img src="logo.png" alt="FransLDLIVE Logo" class="logo-img">
    </div>
    <div class="nav-right">
      <div class="dropdown">
        <button class="hamburger" id="dropdownBtn" type="button" aria-label="Open navigation menu" aria-expanded="false" aria-controls="dropdownMenu">
          <span class="line line1"></span>
          <span class="line line2"></span>
          <span class="line line3"></span>
        </button>
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="index.html" class="dropdown-link">Home</a>
          <a href="socials.html" class="dropdown-link">Socials</a>
          <a href="texturepacks.html" class="dropdown-link">Texture Packs</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="page-shell">
    <div class="content-card">
      <header>
        <img src="profile.png" alt="Profile" class="profile-img">
        <h1>FransLDLIVE</h1>
        <p>Gamer &bull; Minecraft Animator &bull; Content Creator</p>
      </header>

      <main>
        <a href="https://discord.gg/NmwhFCevZF" target="_blank" rel="noopener noreferrer" class="link-btn discord">
          <img src="icons/discord.png" alt="Discord" class="btn-icon">
          <span class="btn-text">Join My "Unfinished" Discord</span>
        </a>

        <a href="https://youtube.com/@FransLDLIVE" target="_blank" rel="noopener noreferrer" class="link-btn youtube">
          <img src="icons/youtube.png" alt="YouTube" class="btn-icon">
          <span class="btn-text">YouTube Channel</span>
        </a>

        <a href="https://www.tiktok.com/@fransldlive" target="_blank" rel="noopener noreferrer" class="link-btn tiktok">
          <img src="icons/tiktok.png" alt="TikTok" class="btn-icon">
          <span class="btn-text">TikTok</span>
        </a>

        <a href="https://www.instagram.com/frnsldlive" target="_blank" rel="noopener noreferrer" class="link-btn instagram">
          <img src="icons/instagram.png" alt="Instagram" class="btn-icon">
          <span class="btn-text">Instagram (Main)</span>
        </a>

        <a href="https://www.instagram.com/cozy_frnsldlive" target="_blank" rel="noopener noreferrer" class="link-btn instagram">
          <img src="icons/instagram.png" alt="Instagram" class="btn-icon">
          <span class="btn-text">Instagram (Cozy Stuffs)</span>
        </a>
      </main>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 LD Studios</p>
    <p class="footer-credit">Website created and coded by FransLDLIVE</p>
  </footer>

  <script>
    const dropdownBtn = document.getElementById('dropdownBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');

    function setMenuState(isOpen) {
      dropdownBtn.classList.toggle('active', isOpen);
      dropdownMenu.classList.toggle('active', isOpen);
      dropdownBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    }

    dropdownBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      const isOpen = !dropdownBtn.classList.contains('active');
      setMenuState(isOpen);
    });

    document.addEventListener('click', function() {
      setMenuState(false);
    });

    dropdownMenu.addEventListener('click', function(e) {
      e.stopPropagation();
    });

    const dropdownLinks = document.querySelectorAll('.dropdown-link');
    dropdownLinks.forEach(link => {
      link.addEventListener('click', function(e) {
        const nextUrl = link.getAttribute('href');
        if (!nextUrl) return;

        e.preventDefault();
        setMenuState(false);
        document.body.classList.add('page-leaving');
        setTimeout(() => {
          window.location.href = nextUrl;
        }, 220);
      });
    });
  </script>
</body>
</html>
